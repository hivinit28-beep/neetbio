  --blue:#60a5fa;--blue2:#2563eb;--blue-bg:rgba(96,165,250,0.1);
  --amber:#fbbf24;--amber-bg:rgba(251,191,36,0.1);
  --red:#f87171;--red-bg:rgba(248,113,113,0.1);
  --teal:#2dd4bf;--teal-bg:rgba(45,212,191,0.1);
  --pink:#f472b6;--pink-bg:rgba(244,114,182,0.1);
  --card-shadow:0 4px 24px rgba(0,0,0,0.4);
  --radius:14px;--radius-sm:9px;--radius-lg:20px;
  --font:'Segoe UI',system-ui,sans-serif;
}
.light{
  --bg:#f0effe;--bg2:#ffffff;--bg3:#f5f3ff;--bg4:#ede9fe;
  --border:rgba(109,40,217,0.1);--border2:rgba(109,40,217,0.2);
  --text:#1e1b4b;--text2:#4c4875;--text3:#9d98c0;
  --purple:#7c3aed;--purple2:#6d28d9;--purple-bg:rgba(124,58,237,0.08);
  --green:#16a34a;--green2:#15803d;--green-bg:rgba(22,163,74,0.08);
  --blue:#2563eb;--blue2:#1d4ed8;--blue-bg:rgba(37,99,235,0.08);
  --amber:#d97706;--amber-bg:rgba(217,119,6,0.08);
  --red:#dc2626;--red-bg:rgba(220,38,38,0.08);
  --teal:#0d9488;--teal-bg:rgba(13,148,136,0.08);
  --pink:#db2777;--pink-bg:rgba(219,39,119,0.08);
  --card-shadow:0 4px 24px rgba(109,40,217,0.08);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;transition:background .4s,color .4s;overflow-x:hidden;}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

/* BIO PATTERN */
#bioBg{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
#bioBg svg{position:absolute;opacity:.035;}
.light #bioBg svg{opacity:.055;}
#app{position:relative;z-index:1;}

/* ANIMATIONS */
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-18px)}}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.fade-up{animation:fadeUp .32s ease forwards;}
.spin{display:inline-block;animation:spin 1s linear infinite;}
.float{animation:float 3s ease-in-out infinite;}
.pulse{animation:pulse 1.5s ease-in-out infinite;}

/* NAV */
.nav{position:sticky;top:0;z-index:100;background:var(--bg2);border-bottom:1px solid var(--border);padding:0 1.5rem;height:58px;display:flex;align-items:center;justify-content:space-between;backdrop-filter:blur(12px);}
.logo-icon{width:38px;height:38px;border-radius:12px;background:linear-gradient(135deg,var(--purple2),var(--blue2));display:flex;align-items:center;justify-content:center;font-size:20px;}
.logo-text{font-size:17px;font-weight:800;letter-spacing:-.5px;}
.logo-text span{color:var(--purple);}
.plan-badge{font-size:11px;padding:4px 12px;border-radius:20px;font-weight:700;background:var(--purple-bg);color:var(--purple);border:1px solid var(--border);}
.icon-btn{width:36px;height:36px;border-radius:10px;border:1px solid var(--border);background:var(--bg3);color:var(--text2);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.icon-btn:hover{border-color:var(--border2);color:var(--text);}

/* CARDS */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem;box-shadow:var(--card-shadow);transition:border-color .2s;}
.card-lg{border-radius:var(--radius-lg);padding:1.75rem;}

/* BUTTONS */
.btn{border:none;cursor:pointer;font-family:var(--font);font-weight:600;border-radius:var(--radius-sm);padding:10px 18px;font-size:13px;transition:opacity .15s,transform .1s;}
.btn:active{transform:scale(.97);}
.btn:disabled{opacity:.4;cursor:not-allowed;}
.btn-primary{background:linear-gradient(135deg,var(--purple2),var(--blue2));color:#fff;}
.btn-secondary{background:var(--bg3);color:var(--text);border:1px solid var(--border);}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border);}
.btn-lg{padding:13px 24px;font-size:15px;border-radius:12px;}
.btn-full{width:100%;}
.btn-sm{padding:6px 12px;font-size:12px;}

/* TABS */
.tabs{display:flex;gap:4px;padding:4px;background:var(--bg3);border-radius:12px;border:1px solid var(--border);}
.tab{flex:1;padding:9px 6px;border-radius:9px;border:none;cursor:pointer;font-size:12px;font-weight:600;font-family:var(--font);background:transparent;color:var(--text2);transition:all .2s;}
.tab.active{background:linear-gradient(135deg,var(--purple2),var(--blue2));color:#fff;box-shadow:0 2px 12px rgba(124,58,237,.3);}

/* INPUTS */
input,select,textarea{width:100%;padding:11px 14px;border-radius:10px;border:1px solid var(--border2);background:var(--bg3);color:var(--text);font-family:var(--font);font-size:14px;outline:none;transition:border-color .2s;}
input:focus,select:focus{border-color:var(--purple);}
.input-label{font-size:12px;color:var(--text2);margin-bottom:5px;font-weight:500;}

/* BADGES */
.badge{font-size:11px;padding:3px 10px;border-radius:20px;font-weight:700;display:inline-block;}
.badge-purple{background:var(--purple-bg);color:var(--purple);}
.badge-green{background:var(--green-bg);color:var(--green);}
.badge-blue{background:var(--blue-bg);color:var(--blue);}
.badge-amber{background:var(--amber-bg);color:var(--amber);}
.badge-red{background:var(--red-bg);color:var(--red);}
.badge-teal{background:var(--teal-bg);color:var(--teal);}
.badge-pink{background:var(--pink-bg);color:var(--pink);}

/* LAYOUT */
.section{max-width:780px;margin:0 auto;padding:1.25rem 1rem;}
.sec-title{font-size:10px;font-weight:700;color:var(--text3);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:10px;}

/* HERO */
.hero{position:relative;overflow:hidden;background:linear-gradient(135deg,rgba(124,58,237,.15),rgba(37,99,235,.1));border:1px solid var(--border);border-radius:var(--radius-lg);padding:2rem;margin-bottom:1.25rem;}
.hero::before{content:'';position:absolute;top:-60px;right:-60px;width:240px;height:240px;border-radius:50%;background:radial-gradient(circle,rgba(167,139,250,.2),transparent);}
.hero::after{content:'';position:absolute;bottom:-40px;left:-40px;width:180px;height:180px;border-radius:50%;background:radial-gradient(circle,rgba(96,165,250,.15),transparent);}
.hero-content{position:relative;z-index:1;}
.hero-kicker{font-size:11px;letter-spacing:2px;color:var(--purple);font-weight:700;margin-bottom:8px;}
.hero h1{font-size:26px;font-weight:900;line-height:1.25;margin-bottom:10px;}
.hero h1 span{background:linear-gradient(135deg,var(--purple),var(--blue));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.hero p{font-size:13px;color:var(--text2);line-height:1.75;max-width:480px;margin-bottom:1.25rem;}
.chip{font-size:12px;padding:5px 13px;border-radius:20px;background:var(--bg2);color:var(--text2);border:1px solid var(--border);display:inline-block;margin:3px;}

/* CHAPTER ROW */
.ch-row{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:.9rem 1.25rem;display:flex;align-items:center;justify-content:space-between;gap:12px;transition:border-color .2s,transform .15s;}
.ch-row:hover{border-color:var(--border2);transform:translateX(2px);}
.ch-name{font-size:13.5px;font-weight:600;color:var(--text);margin-bottom:2px;}
.ch-meta{font-size:11px;color:var(--text3);}

.unit-header{display:flex;align-items:center;gap:10px;margin-bottom:8px;margin-top:4px;}
.unit-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.unit-label{font-size:10px;font-weight:700;color:var(--text3);letter-spacing:1.5px;text-transform:uppercase;}

/* LEARNER BANNER */
.learner-banner{border-radius:14px;padding:1.25rem;border:1px solid var(--border);display:flex;align-items:flex-start;gap:14px;margin-bottom:1rem;background:linear-gradient(135deg,var(--purple-bg),var(--blue-bg));}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:200;display:flex;align-items:center;justify-content:center;padding:1rem;backdrop-filter:blur(6px);}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius-lg);padding:2rem;max-width:480px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 24px 80px rgba(0,0,0,.5);}

/* QR */
.qr-box{background:#fff;padding:12px;border-radius:14px;display:inline-block;margin:0 auto;}
.upi-apps{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-top:10px;}

/* STAT */
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
.stat-card{border-radius:12px;padding:1rem;text-align:center;}

/* SCORE RING */
.score-ring{position:relative;width:150px;height:150px;margin:0 auto;}
.score-ring svg{width:150px;height:150px;transform:rotate(-90deg);}
.score-ring .center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}

/* PROG BAR */
.prog-bar{height:6px;background:var(--bg3);border-radius:3px;overflow:hidden;margin-top:4px;}
.prog-fill{height:100%;border-radius:3px;transition:width .8s ease;}

/* Q MAP */
.q-map{display:flex;flex-wrap:wrap;gap:5px;}
.q-dot{width:32px;height:32px;border-radius:8px;border:1px solid var(--border);background:var(--bg3);color:var(--text3);cursor:pointer;font-size:11px;font-weight:600;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.q-dot.current{border-color:var(--purple);color:var(--purple);background:var(--purple-bg);border-width:2px;}
.q-dot.answered{background:var(--green-bg);border-color:var(--green);color:var(--green);}
.q-dot.flagged{background:var(--amber-bg);border-color:var(--amber);color:var(--amber);}

/* OPT */
.opt-btn{width:100%;padding:12px 16px;border-radius:12px;border:1px solid var(--border);background:var(--bg3);color:var(--text);cursor:pointer;text-align:left;display:flex;align-items:center;gap:12px;font-size:14px;font-family:var(--font);transition:border-color .15s,background .15s;}
.opt-btn.selected{border-color:var(--purple);border-width:2px;background:var(--purple-bg);color:var(--purple);}
.opt-letter{width:30px;height:30px;border-radius:8px;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:12px;flex-shrink:0;background:var(--bg2);color:var(--text2);}
.opt-btn.selected .opt-letter{background:var(--purple2);color:#fff;border-color:var(--purple2);}

/* REVIEW */
.review-q{border:1px solid var(--border);border-radius:12px;padding:1rem;margin-bottom:8px;}
.review-opt{font-size:12px;padding:4px 10px;border-radius:8px;border:1px solid var(--border);display:inline-block;margin:3px;}
.review-opt.correct{background:var(--green-bg);border-color:var(--green);color:var(--green);}
.review-opt.wrong{background:var(--red-bg);border-color:var(--red);color:var(--red);}

/* ADMIN TABLE */
.admin-table{width:100%;border-collapse:collapse;font-size:12px;}
.admin-table th{text-align:left;padding:8px 10px;font-size:10px;color:var(--text3);font-weight:600;letter-spacing:1px;text-transform:uppercase;border-bottom:1px solid var(--border);}
.admin-table td{padding:10px;border-bottom:1px solid var(--border);color:var(--text2);}
.admin-table tr:hover td{background:var(--bg3);}

/* NOTIF */
.notif{position:fixed;top:68px;right:1rem;z-index:400;background:var(--bg2);border:1px solid var(--border2);border-radius:12px;padding:11px 18px;font-size:13px;font-weight:600;box-shadow:var(--card-shadow);animation:fadeUp .3s ease;max-width:320px;}
.notif.success{border-color:var(--green);color:var(--green);}
.notif.error{border-color:var(--red);color:var(--red);}

/* LOADING */
.load-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:65vh;text-align:center;padding:2rem;}

/* PROJ BAR */
.proj-wrap{height:10px;background:var(--bg3);border-radius:5px;overflow:hidden;position:relative;margin:8px 0;}
.proj-cutoff{position:absolute;top:0;bottom:0;width:2px;background:var(--amber);left:75%;}

@media(max-width:500px){
  .stat-grid{grid-template-columns:repeat(2,1fr);}
  .hero h1{font-size:20px;}
  .ch-row{flex-wrap:wrap;}
  .nav{padding:0 .75rem;}
}
</style>

// Simple but solid hash function (djb2 variant)
function nbHash(s){
  var h = 5381;
  for(var i = 0; i < s.length; i++){
    h = ((h << 5) + h) ^ s.charCodeAt(i);
    h = h & 0xFFFFFFFF;
  }
  var chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  var result = '';
  var n = (h >>> 0);
  for(var j = 0; j < 5; j++){
    result += chars[n % chars.length];
    n = Math.floor(n / chars.length);
  }
  return result;
}

// Verify any code (works on ANY device — no pre-generation needed)
function nbVerifyCode(code){
  code = code.trim().toUpperCase();
  var parts = code.split('-');
  if(parts.length !== 3) return null;
  var prefix = parts[0]; // BSC, CLU, PRO
  var body   = parts[1]; // 5 chars
  var check  = parts[2]; // 5 chars (checksum)
  if(body.length < 4 || check.length < 4) return null;
  var planMap = {'BSC':'basic','CLU':'cluster','PRO':'pro'};
  var plan = planMap[prefix];

  // Verify: recompute checksum
  var expected = nbHash(NB_SECRET + plan + body);
  if(expected !== check) return null;
  return {plan: plan, name: '', _unlimited: true, _code: code};
}

// Generate a valid code for a given plan
function nbGenCode(plan){
  var prefixMap = {'basic':'BSC','cluster':'CLU','pro':'PRO'};
  var prefix = prefixMap[plan] || 'BSC';
  var chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';

}

function getFB(cid){
  // Use full QB if available, otherwise use short FB fallback
  if(QB[cid]){
    var ch=CHAPTERS.find(function(c){return c.id===cid;});
    return QB[cid].map(function(q,i){return Object.assign({},q,{id:'qb-'+cid+'-'+i,chapterId:cid,chapterName:ch?ch.name:''});});
  }
  var qs=FB[cid]||FB[1];
  var ch=CHAPTERS.find(function(c){return c.id===cid;});
  return qs.map(function(q,i){return Object.assign({},q,{id:'fb-'+cid+'-'+i,chapterId:cid,chapterName:ch?ch.name:''});});
}

function drawBio(){
  var bg=document.getElementById('bioBg');
  var W=window.innerWidth,H=window.innerHeight;
  var c=S.theme==='dark'?'#a78bfa':'#7c3aed';

  // DNA helix (left column)
  var dna='<svg width="80" height="'+H+'" style="left:0;top:0" xmlns="http://www.w3.org/2000/svg">';
  for(var y=0;y<H;y+=6){
    dna+='<circle cx="'+(40+Math.sin(y*.05)*28)+'" cy="'+y+'" r="2" fill="'+c+'"/>';
    dna+='<circle cx="'+(40-Math.sin(y*.05)*28)+'" cy="'+y+'" r="1.5" fill="'+c+'" opacity="0.5"/>';
    if(y%36===0)dna+='<line x1="'+(40+Math.sin(y*.05)*28)+'" y1="'+y+'" x2="'+(40-Math.sin(y*.05)*28)+'" y2="'+y+'" stroke="'+c+'" stroke-width="0.8" opacity="0.35"/>';
  }
  dna+='</svg>';

  // DNA helix (right column)
  var dna2='<svg width="80" height="'+H+'" style="right:0;top:0" xmlns="http://www.w3.org/2000/svg">';
  for(var y2=0;y2<H;y2+=6){
    dna2+='<circle cx="'+(40+Math.cos(y2*.05)*28)+'" cy="'+y2+'" r="2" fill="'+c+'"/>';
    dna2+='<circle cx="'+(40-Math.cos(y2*.05)*28)+'" cy="'+y2+'" r="1.5" fill="'+c+'" opacity="0.5"/>';
    if(y2%36===0)dna2+='<line x1="'+(40+Math.cos(y2*.05)*28)+'" y1="'+y2+'" x2="'+(40-Math.cos(y2*.05)*28)+'" y2="'+y2+'" stroke="'+c+'" stroke-width="0.8" opacity="0.35"/>';
  }
  dna2+='</svg>';

  // Hex cells
  var hex='<svg width="'+W+'" height="'+H+'" style="left:0;top:0;opacity:0.025" xmlns="http://www.w3.org/2000/svg">';
  for(var row=0;row<Math.ceil(H/70)+1;row++){
    for(var col=0;col<Math.ceil(W/80)+1;col++){
      var cx=col*80+(row%2)*40,cy=row*70;
      var pts=[];
      for(var i=0;i<6;i++){var a=Math.PI/180*(60*i-30);pts.push((cx+32*Math.cos(a)).toFixed(1)+','+(cy+32*Math.sin(a)).toFixed(1));}
      hex+='<polygon points="'+pts.join(' ')+'" fill="none" stroke="'+c+'" stroke-width="0.8"/>';
    }
  }
  hex+='</svg>';

  // Floating molecules
  var mol='<svg width="'+W+'" height="'+H+'" style="left:0;top:0" xmlns="http://www.w3.org/2000/svg">';
  var seeds=[.1,.3,.5,.7,.9,.15,.45,.65,.85,.25,.75,.4,.6,.8,.2];
  for(var m=0;m<15;m++){
    var mx=seeds[m]*W, my=((seeds[(m+3)%15]+seeds[(m+7)%15])%1)*H;
    var mr=seeds[(m+1)%15]*14+6;
    mol+='<circle cx="'+mx+'" cy="'+my+'" r="'+mr+'" fill="none" stroke="'+c+'" stroke-width="0.8"/>';
    mol+='<circle cx="'+(mx+mr+10)+'" cy="'+my+'" r="'+(mr*.6)+'" fill="none" stroke="'+c+'" stroke-width="0.6"/>';
    mol+='<line x1="'+(mx+mr)+'" y1="'+my+'" x2="'+(mx+mr+10)+'" y2="'+my+'" stroke="'+c+'" stroke-width="0.8"/>';
  }
  mol+='</svg>';

  bg.innerHTML=dna+dna2+hex+mol;
}

// ════════════════════════════════════════════════════════════════
function learnerProfile(){
  var h=S.history, qt=S.qTimings;
  if(!h.length) return null;
  var avgAcc=h.reduce(function(s,x){return s+x.accuracy;},0)/h.length;
  var validT=qt.filter(Boolean);
  var avgTime=validT.length?validT.reduce(function(a,b){return a+b;},0)/validT.length/1000:null;
  var last3=h.slice(-3);
  var improving=last3.length>=3&&last3[2].accuracy>last3[0].accuracy;
  var consistent=last3.length>=3&&(Math.max.apply(null,last3.map(function(x){return x.accuracy;}))-Math.min.apply(null,last3.map(function(x){return x.accuracy;})))<15;
  var streaks=0; for(var i=h.length-1;i>=0;i--){if(h[i].accuracy>=70)streaks++;else break;}

  var label,icon,color,desc,tips;
  if(avgAcc>=85&&avgTime&&avgTime<25){
    label='⚡ Quick Learner';icon='🚀';color='var(--green)';
    desc='Excellent accuracy with very fast responses. You grasp NEET concepts intuitively and recall well under exam pressure.';
    tips=['Attempt harder previous year NEET questions','Practice full mocks with strict time limits','Analyse NEET traps and exceptions'];
  } else if(avgAcc>=80&&(!avgTime||avgTime>=25)){
    label='🧠 Deep Thinker';icon='🎯';color='var(--blue)';
    desc='High accuracy but slightly slower. You think thoroughly — a sign of deep conceptual understanding. Speed up with practice.';
    tips=['Do timed drills: 1 min per question max','Use flashcards for quick-recall facts','Focus on plant physiology speed (many facts)'];
  } else if(avgAcc>=65&&improving){
    label='📈 Fast Improver';icon='📈';color='var(--purple)';
    desc='Scores climbing consistently across tests. You are on the perfect learning curve. Keep this momentum.';
    tips=['Revisit incorrect answers the same day','Target weak chapters next','Create a 30-day revision timetable'];
  } else if(avgAcc>=60&&consistent){
    label='📚 Steady Learner';icon='📚';color='var(--teal)';
    desc='Consistent but needs a push to top scores. Solid foundation — targeted deep revision will unlock the jump.';
    tips=['Spend extra time on Class 12 Genetics (high NEET weightage)','Solve 20+ questions per chapter daily','Attempt previous 10 years NEET papers'];
  } else if(avgAcc>=40){
    label='🏗️ Building Blocks';icon='🏗️';color='var(--amber)';
    desc='You have basics but gaps remain. Identify your top 5 weak chapters and revise NCERT line by line for them.';
    tips=['Re-read NCERT for low-accuracy chapters first','Start with 10 questions per chapter, build to 90','Join a doubt-clearing session for difficult units'];
  } else {
    label='💪 Needs Support';icon='💪';color='var(--red)';
    desc='Fundamentals need strengthening. Every expert started here! Focus on NCERT basics and build confidence chapter by chapter.';
    tips=['Study NCERT line-by-line, make notes','Start with Class 11 Unit 1 and progress systematically','Dedicate 5+ hours daily to Biology'];
  }

  var speedLabel=null;
  if(avgTime){
    if(avgTime<20) speedLabel={l:'Lightning Fast ⚡',c:'var(--green)'};
    else if(avgTime<40) speedLabel={l:'Good Pace 🏃',c:'var(--blue)'};
    else if(avgTime<65) speedLabel={l:'Moderate Speed ⏱',c:'var(--amber)'};
    else speedLabel={l:'Slow & Steady 🐢',c:'var(--red)'};
  }

  return {label,icon,color,desc,tips,avgAcc,avgTime,improving,consistent,streaks,speedLabel};
}

// AI QUESTION FETCH
// ════════════════════════════════════════════════════════════════
async function fetchAI(chapterName,count){
  count=count||90;
  var prompt='Generate exactly '+count+' NEET Biology MCQ questions for NCERT chapter: "'+chapterName+'".\nRules: 4 options each, mix difficulty (30% easy, 50% medium, 20% hard), cover ALL NCERT subtopics of this chapter, no repeated questions, strictly NCERT-based.\nRespond ONLY with a valid JSON array, zero markdown, zero explanation:\n[{"q":"...?","opts":["A","B","C","D"],"ans":0},...]\n"ans" is 0-based index of correct option.';
  var res=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:9000,messages:[{role:'user',content:prompt}]})
  });
  var data=await res.json();
  var raw=data.content&&data.content.map(function(b){return b.text||'';}).join('')||'[]';
  var clean=raw.replace(/```json|```/g,'').trim();
  return JSON.parse(clean).slice(0,count);
}

// QR CODE GENERATOR
// ════════════════════════════════════════════════════════════════
function makeQR(data,size){
  size=size||180;
  var cells=25, cell=Math.floor(size/cells);
  var seed=0;
  for(var i=0;i<data.length;i++) seed=(seed*31+data.charCodeAt(i))&0xFFFFFF;
  function bit(r,c){
    if((r<7&&c<7)||(r<7&&c>=cells-7)||(r>=cells-7&&c<7)){
      if(r===0||r===6||c===0||c===6||(r>=2&&r<=4&&c>=2&&c<=4)||(r>=cells-5&&r<=cells-3&&c>=2&&c<=4)||(r>=2&&r<=4&&c>=cells-5&&c<=cells-3))return 1;
      return 0;
    }
    if(r===6||c===6) return (r+c)%2===0?1:0;
    return((seed^(r*41+c*19+r*c))&0xFF)>110?1:0;
  }
  var svg='<svg xmlns="http://www.w3.org/2000/svg" width="'+size+'" height="'+size+'" viewBox="0 0 '+cells+' '+cells+'" class="qr-svg">';
  svg+='<rect width="'+cells+'" height="'+cells+'" fill="white"/>';
  for(var r=0;r<cells;r++) for(var c=0;c<cells;c++) if(bit(r,c)) svg+='<rect x="'+c+'" y="'+r+'" width="1" height="1" fill="#1e1b4b"/>';
  svg+='</svg>';
  return svg;
}

function bindLogin(){
  function go(){
    var code=document.getElementById('lgCode').value.trim().toUpperCase();
    var name=document.getElementById('lgName').value.trim();
    var email=document.getElementById('lgEmail').value.trim();
    var err=document.getElementById('lgErr');
    if(!code){err.textContent='Please enter your access code.';err.style.display='block';return;}
    var d = S.codes[code];
    // Check unlimited code system
    if(!d){
      var poolResult = nbVerifyCode(code);
      if(poolResult) d = poolResult;
    }
    if(!d){err.textContent='❌ Invalid code. Please check and try again.';err.style.display='block';return;}
    if(d.__blocked){err.textContent='⚠️ This code is already activated on another device. Contact us on WhatsApp: 7479959845';err.style.display='block';return;}
    if(d.__usedElsewhere){err.textContent='⚠️ This code has already been activated on another device. Contact @7479959845 on WhatsApp.';err.style.display='block';return;}
    S.plan=d.plan;
    S.user={id:uid(),name:name||d.name||'Student',email:email||d.email||'',code};
    S.codes[code]=Object.assign({},d,{used:true,activatedAt:new Date().toLocaleString(),activatedBy:email||name});
    showNotif('Welcome '+S.user.name+'! '+d.plan.toUpperCase()+' plan activated 🎉','success');
    S.screen='home';render();
  }
  document.getElementById('lgBtn').addEventListener('click',go);
  document.getElementById('lgCode').addEventListener('keydown',function(e){if(e.key==='Enter')go();});
}

async function startTest(name,chapterIds,timeMinutes,qCount){
  var chName=CHAPTERS.find(function(c){return c.id===chapterIds[0];})||{};
  var displayName=chName.name||name;

  if(isPaid()&&qCount>=10){
    S.loadState={chapterName:name,progress:8};
    S.screen='loading';render();

    var prog=8;
    var pi=setInterval(function(){
      prog=Math.min(prog+3.5,85);
      S.loadState.progress=prog;
      var bar=document.querySelector('.prog-fill');
      var pct=document.getElementById('loadPct');
      var msg=document.getElementById('loadMsg');
      var msgs=['Every question is NCERT-aligned ✓','30% easy · 50% medium · 20% hard ✓','All subtopics covered ✓','NEET-pattern questions ✓'];
      if(bar) bar.style.width=prog+'%';
      if(pct) pct.textContent=Math.round(prog)+'% — AI generating...';
      if(msg) msg.textContent=msgs[Math.floor(prog/22)%4];
    },650);

    try{
      var allQs=[];
      if(chapterIds.length===1){
        var qs=await fetchAI(displayName,Math.min(qCount,90));
        allQs=qs.map(function(q,i){return Object.assign({},q,{id:'ai-'+i,chapterId:chapterIds[0],chapterName:displayName});});
      } else {
        var perCh=Math.max(3,Math.ceil(Math.min(qCount,90)/chapterIds.length));
        for(var i=0;i<chapterIds.length;i++){
          var cid=chapterIds[i];
          var ch2=CHAPTERS.find(function(c){return c.id===cid;})||{};
          var cqs=await fetchAI(ch2.name||'Biology',Math.min(perCh,15));
          cqs.forEach(function(q,ii){allQs.push(Object.assign({},q,{id:'ai-'+cid+'-'+ii,chapterId:cid,chapterName:ch2.name||''}));});
        }
      }
      clearInterval(pi);
      S.loadState.progress=100;
      var bar=document.querySelector('.prog-fill');
      if(bar) bar.style.width='100%';
      await new Promise(function(r){setTimeout(r,350);});
      launchTest(name,allQs,timeMinutes);
    } catch(e){
      clearInterval(pi);
      var fb=[];
      chapterIds.forEach(function(cid){fb=fb.concat(getFB(cid));});
      showNotif('AI unavailable — using backup questions','error');
      launchTest(name,fb,timeMinutes);
    }
  } else {
    var fb2=[];
    chapterIds.forEach(function(cid){fb2=fb2.concat(getFB(cid));});
    launchTest(name,fb2,timeMinutes);
  }
}

function launchTest(name,questions,timeMinutes){
  S.activeTest={name,questions,timeMinutes};
  S.answers=Array(questions.length).fill(null);
  S.flagged=new Set();
  S.currentQ=0;S.timeLeft=timeMinutes*60;
  S.startTime=Date.now();S.qTimings=[];S.qStartTime=Date.now();
  S.showMap=false;S.screen='test';render();
  startTimer();
}

function startTimer(){
  if(S.timerInt) clearInterval(S.timerInt);
  S.timerInt=setInterval(function(){
    S.timeLeft--;
    var el=document.getElementById('timerDisp');
    if(el){el.textContent=fmt(S.timeLeft);el.style.color=S.timeLeft<300?'var(--red)':'var(--text)';}
    if(S.timeLeft<=0){clearInterval(S.timerInt);submitTest();}
  },1000);
}

function bindTest(){
  var t=S.activeTest;
  document.getElementById('mapBtn')&&document.getElementById('mapBtn').addEventListener('click',function(){
    S.showMap=!S.showMap;render();startTimer();setTimeout(function(){if(S.showMap){var p=document.getElementById('mapBtn');if(p)p.textContent='Hide';}},50);
  });
  document.getElementById('submitBtn')&&document.getElementById('submitBtn').addEventListener('click',function(){
    var done=S.answers.filter(function(a){return a!==null;}).length;
    var left=t.questions.length-done;
    var msg=left>0?'Submit now?\n\n✅ Answered: '+done+'\n⬜ Unanswered: '+left+'\n\nUnanswered questions get 0 marks (no penalty).':'All '+done+' questions answered! Submit the test?';
    if(confirm(msg)) submitTest();
  });
  document.getElementById('flagBtn')&&document.getElementById('flagBtn').addEventListener('click',function(){
    var f=new Set(S.flagged);
    f.has(S.currentQ)?f.delete(S.currentQ):f.add(S.currentQ);
    S.flagged=f;render();startTimer();
  });
  document.querySelectorAll('[data-oi]').forEach(function(btn){
    btn.addEventListener('click',function(){
      var i=parseInt(btn.dataset.oi);
      if(S.qStartTime){S.qTimings[S.currentQ]=Date.now()-S.qStartTime;S.qStartTime=Date.now();}
      S.answers[S.currentQ]=i;render();startTimer();
    });
  });
  document.querySelectorAll('[data-qi]').forEach(function(dot){
    dot.addEventListener('click',function(){
      S.currentQ=parseInt(dot.dataset.qi);S.qStartTime=Date.now();
      S.showMap=true;render();startTimer();
    });
  });
  document.getElementById('prevBtn')&&document.getElementById('prevBtn').addEventListener('click',function(){
    if(S.currentQ>0){S.currentQ--;S.qStartTime=Date.now();render();startTimer();}
  });
  document.getElementById('nextBtn')&&document.getElementById('nextBtn').addEventListener('click',function(){
    if(S.currentQ<t.questions.length-1){S.currentQ++;S.qStartTime=Date.now();render();startTimer();}
  });
}

function submitTest(){
  clearInterval(S.timerInt);
  var elapsed=Math.round((Date.now()-S.startTime)/1000);
  var t=S.activeTest, ans=S.answers, qt=S.qTimings;
  var correct=t.questions.filter(function(q,i){return ans[i]===q.ans;}).length;
  var wrong=ans.filter(function(a,i){return a!==null&&a!==t.questions[i].ans;}).length;
  var score=correct*4+wrong*(-1);
  var maxScore=t.questions.length*4;
  var accuracy=Math.round((correct/t.questions.length)*100);
  var validT=qt.filter(Boolean);
  var avgTime=validT.length?validT.reduce(function(a,b){return a+b;},0)/validT.length/1000:null;
  S.history.push({testName:t.name,score,maxScore,accuracy,date:new Date().toLocaleDateString(),avgTime});
  S.testResult={questions:t.questions,answers:[...ans],timeTaken:elapsed,testName:t.name,score,maxScore,correct,wrong,skipped:t.questions.length-ans.filter(function(a){return a!==null;}).length,accuracy,qTimings:[...qt]};
  S.screen='result';render();
}

  '</div>':'')+

  // History
  (S.history.length>1?'<div class="card" style="margin-bottom:1.25rem">'+
  '<div style="font-size:13px;font-weight:700;margin-bottom:10px">📊 Score History</div>'+
  S.history.slice(-5).reverse().map(function(h){return(
    '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">'+
    '<div style="font-size:12px;color:var(--text2);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-right:8px">'+h.testName+'</div>'+
    '<div style="text-align:right;flex-shrink:0">'+
    '<span style="font-size:13px;font-weight:700;color:'+(h.accuracy>=70?'var(--green)':h.accuracy>=50?'var(--amber)':'var(--red)')+'">'+h.accuracy+'%</span>'+
    '<span style="font-size:11px;color:var(--text3);margin-left:6px">'+h.date+'</span></div></div>'+
    '<div class="prog-bar"><div class="prog-fill" style="width:'+h.accuracy+'%;background:'+(h.accuracy>=70?'var(--green)':h.accuracy>=50?'var(--amber)':'var(--red)')+'"></div></div>'
  );}).join('')+'</div>':'')+ 

  // Question Review
  '<div class="card" style="margin-bottom:1.25rem">'+
  '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">'+
  '<div style="font-size:14px;font-weight:700">Question Review</div>'+
  '<div style="font-size:12px;color:var(--text3)">'+questions.length+' questions</div>'+
  '</div>'+
  '<div id="reviewContainer">'+
  questions.slice(0,12).map(function(q,i){
    var ua=answers[i],iC=ua===q.ans,iW=ua!==null&&!iC;
    var sc=iC?{c:'var(--green)',bg:'var(--green-bg)',l:'+4'}:iW?{c:'var(--red)',bg:'var(--red-bg)',l:'-1'}:{c:'var(--text3)',bg:'var(--bg3)',l:'0'};
    return '<div class="review-q" style="background:'+sc.bg+'33">'+
    '<div style="display:flex;justify-content:space-between;gap:8px;margin-bottom:8px">'+
    '<span style="font-size:13px;flex:1;line-height:1.65">Q'+(i+1)+'. '+q.q+'</span>'+
    '<span style="font-size:13px;font-weight:900;color:'+sc.c+';flex-shrink:0">'+sc.l+'</span>'+
    '</div>'+
    '<div>'+q.opts.map(function(opt,j){
      var isA=j===q.ans,isU=j===ua;
      return '<span class="review-opt'+(isA?' correct':'')+(isU&&!isA?' wrong':'')+'">'+String.fromCharCode(65+j)+'. '+opt+(isA?' ✓':'')+(isU&&!isA?' ✗':'')+'</span>';
    }).join('')+'</div></div>';
  }).join('')+
  '</div>'+
  (questions.length>12?'<button class="btn btn-ghost btn-full" id="showAllBtn" style="margin-top:8px">Show all '+questions.length+' questions ▼</button>':'')+
  '</div>'+

  '<div style="display:flex;gap:10px">'+
  '<button class="btn btn-ghost btn-full" id="retryBtn">Retry Test</button>'+
  '<button class="btn btn-primary btn-full" id="homeBtn">← Home</button>'+
  '</div></div>';
}

function bindResult(){
  document.getElementById('retryBtn')&&document.getElementById('retryBtn').addEventListener('click',function(){
    var t=S.activeTest;launchTest(t.name,t.questions,t.timeMinutes);
  });
  document.getElementById('homeBtn')&&document.getElementById('homeBtn').addEventListener('click',function(){
    S.screen='home';render();
  });
  document.getElementById('showAllBtn')&&document.getElementById('showAllBtn').addEventListener('click',function(){
    var r=S.testResult;
    var extra=r.questions.slice(12).map(function(q,idx){
      var i=idx+12,ua=r.answers[i],iC=ua===q.ans,iW=ua!==null&&!iC;
      var sc=iC?{c:'var(--green)',bg:'var(--green-bg)',l:'+4'}:iW?{c:'var(--red)',bg:'var(--red-bg)',l:'-1'}:{c:'var(--text3)',bg:'var(--bg3)',l:'0'};
      return '<div class="review-q" style="background:'+sc.bg+'33">'+
      '<div style="display:flex;justify-content:space-between;gap:8px;margin-bottom:8px">'+
      '<span style="font-size:13px;flex:1;line-height:1.65">Q'+(i+1)+'. '+q.q+'</span>'+
      '<span style="font-size:13px;font-weight:900;color:'+sc.c+';flex-shrink:0">'+sc.l+'</span>'+
      '</div><div>'+q.opts.map(function(opt,j){var isA=j===q.ans,isU=j===ua;
      return '<span class="review-opt'+(isA?' correct':'')+(isU&&!isA?' wrong':'')+'">'+String.fromCharCode(65+j)+'. '+opt+(isA?' ✓':'')+(isU&&!isA?' ✗':'')+'</span>';}).join('')+'</div></div>';
    }).join('');
    document.getElementById('showAllBtn').outerHTML=extra;
  });
}function adminGenCode(){
  var nameEl = document.getElementById('newName');
  var phoneEl = document.getElementById('newEmail');
  var planEl = document.getElementById('newPlan');
  var name = nameEl ? nameEl.value.trim() : '';
  var phone = phoneEl ? phoneEl.value.trim() : '';
  var plan = planEl ? planEl.value : 'pro';
  if(!name){alert('Please enter student name');return;}

  // Generate UNLIMITED unique code using secret key
  var code = nbGenCode(plan);

  // Verify it works (sanity check)
  var verify = nbVerifyCode(code);
  if(!verify){alert('Code generation error — please try again');return;}

  // Show result
  var el = document.getElementById('genCode');
  var res = document.getElementById('genResult');
  if(el) el.textContent = code;
  if(res) res.style.display = 'block';

  // WhatsApp message
  var msg = 'Hello ' + name + '!\n\nYour NEETBio Pro access code is:\n\n' + code + '\n\nHow to activate:\n1. Open the NEETBio Pro app\n2. Click \'Get Access\'\n3. Click \'Already paid? Enter your code\'\n4. Enter your name and this code\n5. Start practising NEET Biology!\n\nPlan: ' + plan.toUpperCase() + ' | Lifetime access\nAll the best for NEET! \n\n- NEETBio Pro Team';
  var waBtn = document.getElementById('waShareBtn');
  if(waBtn) waBtn.onclick = function(){
    var ph = phone.replace(/\D/g,'');
    if(ph.length === 10) ph = '91' + ph;
    window.open('https://wa.me/' + ph + '?text=' + encodeURIComponent(msg), '_blank');
  };

  // Save to issued log in localStorage (persists on Vinit's device)
  var log = JSON.parse(localStorage.getItem('nb_issued') || '[]');
  log.unshift({code:code, name:name, phone:phone, plan:plan, issuedAt:new Date().toLocaleString()});
  localStorage.setItem('nb_issued', JSON.stringify(log));

  notif('Code generated for ' + name + ' ✅');
  // Reset form
  if(nameEl) nameEl.value = '';
  if(phoneEl) phoneEl.value = '';
  return;

}



function renderIssuedLog(){
  try {
    var log = JSON.parse(localStorage.getItem('nb_issued') || '[]');
    if(!log.length) return '<div class="card" style="margin-bottom:1.5rem"><div style="font-size:14px;font-weight:700;margin-bottom:.8rem">\uD83D\uDCCB Issued Codes Log</div><div style="font-size:12px;color:var(--text3);text-align:center;padding:1rem">No codes issued yet. Generate your first code above.</div></div>';
    var rows = log.map(function(l,i){
      return '<tr style="border-bottom:1px solid var(--border)"><td style="padding:5px 6px;color:var(--text3)">'+(i+1)+'</td><td style="padding:5px 6px;font-weight:600">'+l.name+'<br><span style="color:var(--text3);font-size:10px">'+l.phone+'</span></td><td style="padding:5px 6px;font-family:monospace;color:var(--purple);font-weight:700;font-size:10px">'+l.code+'</td><td style="padding:5px 6px"><span style="background:var(--blue-bg);color:var(--blue);padding:2px 6px;border-radius:20px;font-size:9px;font-weight:700">'+l.plan.toUpperCase()+'</span></td><td style="padding:5px 6px;color:var(--text3);font-size:10px">'+l.issuedAt+'</td></tr>';
    }).join('');
    return '<div class="card" style="margin-bottom:1.5rem"><div style="font-size:14px;font-weight:700;margin-bottom:.8rem">\uD83D\uDCCB Issued Codes Log</div><div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:11px"><tr style="border-bottom:1px solid var(--border)"><th style="text-align:left;padding:5px 6px;color:var(--text3)">#</th><th style="text-align:left;padding:5px 6px;color:var(--text3)">Student</th><th style="text-align:left;padding:5px 6px;color:var(--text3)">Code</th><th style="text-align:left;padding:5px 6px;color:var(--text3)">Plan</th><th style="text-align:left;padding:5px 6px;color:var(--text3)">Date</th></tr>'+rows+'</table></div><button onclick="localStorage.removeItem(\'nb_issued\');render()" style="margin-top:10px;background:transparent;border:1px solid var(--border);border-radius:8px;padding:6px 12px;color:var(--text3);cursor:pointer;font-size:11px;font-family:inherit">Clear Log</button></div>';
  } catch(e) {
    return '<div class="card" style="margin-bottom:1.5rem"><div>Issued Codes Log</div><div style="color:var(--text3);font-size:12px">Error loading log.</div></div>';
  }
}

function renderAdmin(){
  var codes=S.codes;
  var activeCount=Object.values(codes).filter(function(c){return c.used;}).length;
  return '<div class="section">'+
  '<div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:1.25rem">'+

  '<div class="card" style="text-align:center;background:var(--green-bg)">'+
  '<div style="font-size:28px;font-weight:900;color:var(--green)">'+activeCount+'</div>'+
  '<div style="font-size:12px;color:var(--green)">Active Users</div></div>'+
  '<div class="card" style="text-align:center;background:var(--blue-bg)">'+
  '<div style="font-size:28px;font-weight:900;color:var(--blue)">'+S.history.length+'</div>'+
  '<div style="font-size:12px;color:var(--blue)">Tests Taken</div></div>'+
  '</div>'+

  // Generate
  '<div class="card" style="margin-bottom:1.5rem">'+
  '<div style="font-size:14px;font-weight:700;margin-bottom:1rem">➕ Generate Unique Code for Student</div>'+
  '<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px">'+
  '<div><div class="input-label">Student Name</div><input type="text" id="newName" placeholder="e.g. Ananya Gupta" style="width:100%;box-sizing:border-box"></div>'+
  '<div><div class="input-label">WhatsApp / Phone</div><input type="text" id="newEmail" placeholder="9876543210" style="width:100%;box-sizing:border-box"></div>'+
  '</div>'+
  '<div style="display:flex;gap:10px;align-items:flex-end;margin-bottom:0">'+

  '<div style="font-size:11px;color:var(--text2);margin-bottom:8px;text-align:center">✅ Unique code generated — send this to student via WhatsApp:</div>'+
  '<div id="genCode" style="font-size:22px;font-weight:900;color:var(--purple);letter-spacing:3px;font-family:monospace;text-align:center;margin-bottom:8px"></div>'+
  '<div style="display:flex;gap:8px;justify-content:center">'+
  '<button onclick="navigator.clipboard.writeText(document.getElementById(\'genCode\').textContent).then(function(){notif(\'Code copied ✓\')})" style="background:var(--purple);color:#fff;border:none;border-radius:8px;padding:8px 16px;cursor:pointer;font-family:inherit;font-weight:700;font-size:12px">📋 Copy Code</button>'+
  '<button id="waShareBtn" style="background:#25D366;color:#fff;border:none;border-radius:8px;padding:8px 16px;cursor:pointer;font-family:inherit;font-weight:700;font-size:12px">💬 Send on WhatsApp</button>'+

  renderIssuedLog()+

  '</div>'+
  // Table
  '<div class="card">'+
  '<div style="font-size:14px;font-weight:700;margin-bottom:1rem">All Access Codes</div>'+
  '<div style="overflow-x:auto">'+
  '<table class="admin-table">'+
  '<thead><tr><th>Code</th><th>Name</th><th>Plan</th><th>Status</th><th>Activated</th><th>Action</th></tr></thead>'+
  '<tbody>'+
  Object.entries(codes).map(function(e){
    var code=e[0],d=e[1];
    return '<tr>'+
    '<td><code style="color:var(--purple);font-size:12px">'+code+'</code></td>'+
    '<td>'+d.name+'</td>'+

    '<td><span class="badge '+(d.used?'badge-green':'badge-red')+'">'+(d.used?'✓ Active':'Unused')+'</span></td>'+

function bindAdmin(){
  document.getElementById('genBtn')&&document.getElementById('genBtn').addEventListener('click',function(){
    var name=document.getElementById('newName').value.trim();
    var email=document.getElementById('newEmail').value.trim();
    var plan=document.getElementById('newPlan').value;
    if(!name){showNotif('Please enter student name','error');return;}
    var initials=name.split(' ').map(function(w){return w[0]?w[0].toUpperCase():'';}).join('').slice(0,4);
    var code=initials+Math.random().toString(36).slice(2,6).toUpperCase();
    S.codes[code]={plan,name,email,used:false};
    document.getElementById('genCode').textContent=code;
    document.getElementById('genResult').style.display='block';
    showNotif('Code '+code+' created for '+name,'success');
  });
}

window.revokeCode=function(code){
  if(confirm('Revoke code '+code+'? This will log out the student.')){
    delete S.codes[code];
    showNotif('Code '+code+' revoked','success');
    render();bindAdmin();
  }
};
